name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # @pocket-t/shared only exports its dist, so build it before anything
      # typechecks against it.
      - name: Build shared
        run: pnpm --filter @pocket-t/shared build

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test
        run: pnpm --filter @pocket-t/daemon test

      - name: Build
        run: pnpm -r build

      - name: Lint
        run: pnpm lint

      # Supply-chain signal: surface known high/critical advisories in
      # production dependencies (e.g. the ws DoS CVE GHSA-96hv-2xvq-fx4p, which
      # the root `ws` override must keep clear). Non-blocking on purpose —
      # `pnpm audit` hits the network on every run, so an unrelated future
      # advisory or a registry hiccup must not gate every merge. Watch the
      # step's status; don't let it fail the job.
      - name: Audit production dependencies
        continue-on-error: true
        run: pnpm audit --prod --audit-level high

  # The `pt` shim becomes the user's login shell, yet CI never compiled it.
  # Build, lint, and test it on macOS — the only platform it ships to.
  shim:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: packages/pt-shim
    steps:
      - uses: actions/checkout@v4

      - name: Install clippy
        run: rustup component add clippy

      - name: Build
        run: cargo build --locked

      - name: Clippy
        run: cargo clippy --locked -- -D warnings

      - name: Test
        run: cargo test --locked
